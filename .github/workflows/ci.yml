name: CI

# Job names are SHORT and STABLE -- `shared`, `server`, `bridge` -- on purpose.
# Branch protection matches required status checks by this literal string, so a
# descriptive job name couples the merge gate to the job's *contents*: renaming
# it (e.g. when the bridge stopped needing an NVDA checkout) silently parks
# every PR on "Expected - waiting for status to be reported" until someone edits
# the repo settings to match. Keep the detail in STEP names, which are free to
# change. Do not "improve" these names.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shared:
    name: shared
    runs-on: windows-latest
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Tests (wire contract)
        run: uv run --python 3.13 pytest -q
      - name: Pyright
        run: uv run --python 3.13 pyright
      # Drift gate: the published JSON Schema is generated from the dataclasses,
      # so regenerating it must leave the committed file byte-identical. If a
      # protocol change forgot to regenerate, git diff makes CI red.
      - name: Wire schema is up to date
        # bash on purpose: the Windows-runner default shell (PowerShell) re-encodes
        # redirected stdout (UTF-16 + BOM), which would corrupt the byte compare.
        shell: bash
        run: |
          uv run --python 3.13 python -m nvda_mcp_wire.schema > ../specs/wire/v1/schema.json
          git diff --exit-code -- ../specs/wire/v1/schema.json

  server:
    name: server
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mcpServer
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Tests
        run: uv run --python 3.13 pytest -q
      - name: Pyright
        run: uv run --python 3.13 pyright

  bridge:
    name: bridge
    runs-on: windows-latest
    defaults:
      run:
        working-directory: bridgeAddon
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # The domain is pure (no NVDA); the NVDA edge is in pyright's ignore list,
      # so no NVDA source checkout or stubs are needed.
      - name: Sync shared wire module into addon
        run: python sync_shared.py
      - name: Tests (headless bridge core)
        run: uv run --python 3.13 --with pytest pytest -q
      - name: Pyright
        run: uv run --python 3.13 --with pyright --with pytest pyright
