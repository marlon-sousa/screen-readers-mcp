name: Release server

# Publishes the MCP server as a DRAFT GitHub release.
#
# TAGGING (monorepo): every component is tagged with its own prefix, so one tag
# selects one component and one asset set (spec 0012). Tag "server-v0.2.0"
# releases the server; "nvda-bridge-v0.2.0" releases the add-on, from its own
# workflow. The two are deliberately independent -- what has to match between
# the halves is the WIRE PROTOCOL VERSION, never their own versions -- which is
# exactly why a single bare vX.Y.Z namespace was rejected.
#
# A dash, not a slash: a slash in a tag is URL-encoded as %2F in the release
# asset download URL.
#
# VERSION LIVES ONLY IN server/version/version.go. The tag does not introduce a
# second copy -- it is an assertion, and this workflow BUILDS THE BINARY AND RUNS
# IT to check. That is spec 0012's rule ("the version is read from the
# component's own manifest and verified against the tag") rendered for a
# language with no buildVars.py, and it proves the artifact starts before it is
# published rather than merely that a constant was edited.
#
# Runs on windows-latest, natively, for the same reason: a cross-compiled binary
# cannot be asked what version it is. Windows is also the only host that matters
# today, since the one bridge that exists runs inside NVDA -- other targets are
# entry 12b's business, along with the .mcpb bundle and the umbrella installer.
#
# Published as a DRAFT on purpose: replacing a bad asset once something links to
# its download URL is painful. Review the draft, then publish.
#
# Note on "Latest": GitHub's latest-release pointer is singular and repo-wide, so
# a server release takes the badge from the add-on and vice versa. Never link
# /releases/latest/download/... -- link an explicit versioned URL.

on:
  push:
    tags:
      - 'server-v*'

permissions:
  contents: write

jobs:
  release:
    name: release server
    runs-on: windows-latest
    steps:
      # Full history: the tag-is-on-main check needs ancestry, which the
      # default depth-1 checkout does not provide.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The `tags:` filter above is a glob (no anchoring, `.` is literal), so it
      # would happily accept server-v1.2 or a stray suffix. This is the real
      # check.
      - name: Validate tag shape
        shell: bash
        id: tag
        run: |
          TAG="$GITHUB_REF_NAME"
          if ! printf '%s' "$TAG" | grep -Eq '^server-v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$TAG' is not of the form server-vMAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "version=${TAG#server-v}" >> "$GITHUB_OUTPUT"

      # Stops a tag pushed from a feature branch publishing unmerged code.
      - name: Tag must be on main
        shell: bash
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not on main. Release only from merged commits."
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum
      # For the conformance gate below: the bridge is stdlib-only, so a bare
      # interpreter is the whole requirement.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # A release must not ship a red tree, and the last of these is the one
      # that matters most: a server that does not interoperate with the real
      # bridge is precisely the artifact nobody should be able to publish.
      - name: Tests (unit)
        working-directory: server
        run: go test ./...
      - name: Tests (integration, real transports)
        working-directory: server
        run: go test -tags integration ./...
      - name: Tests (conformance, the real Python bridge)
        working-directory: server
        run: go test -tags conformance -count=1 ./tests/conformance/

      # CGO_ENABLED=0: one statically linked file that runs with no runtime
      # installed, which is the whole reason this component is in Go.
      - name: Build the binary
        working-directory: server
        shell: bash
        env:
          CGO_ENABLED: '0'
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          mkdir -p dist
          go build -trimpath -o "dist/screenreader-mcp-${VERSION}-windows-amd64.exe" ./cmd/screenreader-mcp

      # Spec 0012's rule, rendered for Go: ask the ARTIFACT what version it is.
      # A constant that was edited but not rebuilt, or a tag pushed against the
      # wrong commit, both fail here.
      - name: The binary's own version must match the tag
        working-directory: server
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          BINARY="dist/screenreader-mcp-${VERSION}-windows-amd64.exe"
          REPORTED="$("./$BINARY" --version | tr -d '\r\n')"
          if [ "$REPORTED" != "$VERSION" ]; then
            echo "::error::Tag says $VERSION but the built binary reports $REPORTED."
            echo "server/version/version.go is the source of truth; bump it and retag."
            exit 1
          fi
          echo "Releasing version $VERSION"

      # The protocol version is what actually determines whether a bridge and a
      # server pair, since `hello` compares PROTOCOL_VERSION and never the
      # component versions. It is read from the PUBLISHED CONTRACT, which the
      # `server` job's drift gate proves the binding matches.
      - name: Compose release notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          PROTOCOL="$(python -c "import json, pathlib; print(json.loads(pathlib.Path('specs/wire/v1/schema.json').read_text(encoding='utf-8'))['protocolVersion'])")"
          NOTES="$RUNNER_TEMP/notes.md"
          {
            printf '# screenreader-mcp %s\n\n' "$VERSION"
            printf 'The MCP server half of this repository: an MCP client speaks MCP over stdio to this binary, and this binary speaks JSON lines to one screen-reader bridge over a named pipe or loopback TCP.\n\n'
            printf 'Statically linked, no runtime required. Point your MCP host at it with no arguments -- it ships knowing where our bridges listen.\n\n'
            printf -- '---\n\n'
            printf 'Speaks **wire protocol version %s**. Pair this server with any bridge that speaks the same protocol version — the component version numbers do not need to match.\n' "$PROTOCOL"
          } > "$NOTES"
          echo "path=$NOTES" >> "$GITHUB_OUTPUT"
          echo "Release notes:"; cat "$NOTES"

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          ASSET="server/dist/screenreader-mcp-${VERSION}-windows-amd64.exe"
          if [ ! -f "$ASSET" ]; then
            echo "::error::Expected asset $ASSET was not produced by the build."
            ls -l server/dist || true
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" "$ASSET" \
            --draft \
            --verify-tag \
            --title "screenreader-mcp $VERSION" \
            --notes-file "${{ steps.notes.outputs.path }}"
          echo "Draft release created. Review it, then publish to make the download URL live."
